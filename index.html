function calcAge(b,d){
  if(!b)return null;
  const p=b.split('.');if(p.length<3)return null;
  const dd=+p[0],mm=+p[1],yy=+p[2];if(!yy||isNaN(yy))return null;
  if(d){const dy=+d;if(!isNaN(dy))return dy-yy>=0?dy-yy:null;}
  const now=new Date();let a=now.getFullYear()-yy;
  if(now.getMonth()<mm-1||(now.getMonth()===mm-1&&now.getDate()<dd))a--;
  return a>=0?a:null;
}
function ageLabel(a){
  if(a==null)return'';
  const m10=a%10,m100=a%100;
  if(m100>=11&&m100<=14)return a+' лет';
  if(m10===1)return a+' год';
  if(m10>=2&&m10<=4)return a+' года';
  return a+' лет';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function gc(g){return g==='male'?['#6366f1','#818cf8']:g==='female'?['#ec4899','#f472b6']:['#0ea5e9','#38bdf8'];}
function avatarSVG(p,sz){
  const[c1,c2]=gc(p.gender),l=esc((p.name||'?')[0]);

}

function gbd(items,mw,fw){
  const m=items.filter(p=>p.gender==='male').length;
  const f=items.filter(p=>p.gender==='female').length;
  const o=items.length-m-f;
  return[m?m+' '+mw:'',f?f+' '+fw:'',o?o+' др.':''].filter(Boolean).join(' · ');
}
function getRelatives(){
  const p=S.persons[S.selId];if(!p)return{};
  const pars=(p.parents||[]).map(id=>S.persons[id]).filter(Boolean);
  const sps=(p.spouses||[]).map(s=>S.persons[s.id]).filter(Boolean);
  const chs=Object.values(S.persons).filter(x=>(x.parents||[]).includes(p.id));
  const sibs_=new Set(p.parents||[]);
  const sibs=Object.values(S.persons).filter(x=>x.id!==p.id&&(x.parents||[]).some(pid=>sibs_.has(pid)));
  const auMap=new Map();
  (p.parents||[]).forEach(pid=>{const par=S.persons[pid];if(!par||!par.parents?.length)return;const gp=new Set(par.parents);Object.values(S.persons).forEach(x=>{if(x.id!==par.id&&(x.parents||[]).some(g=>gp.has(g))){auMap.set(x.id,x);(x.spouses||[]).forEach(s=>{if(S.persons[s.id])auMap.set(s.id,S.persons[s.id]);});}});});
  const aus=Array.from(auMap.values());
  const auIds=new Set(aus.map(a=>a.id));
  const cous=Object.values(S.persons).filter(x=>(x.parents||[]).some(pid=>auIds.has(pid)));
  const gpMap=new Map();
  (p.parents||[]).forEach(pid=>{const par=S.persons[pid];if(par)(par.parents||[]).forEach(gpid=>{if(S.persons[gpid])gpMap.set(gpid,S.persons[gpid]);});});
  const gps=Array.from(gpMap.values());
  const cIds=new Set(chs.map(c=>c.id));
  const gcs=Object.values(S.persons).filter(x=>(x.parents||[]).some(pid=>cIds.has(pid)));
  const z=[],n=[];
  chs.forEach(c=>{(c.spouses||[]).forEach(s=>{const sp=S.persons[s.id];if(!sp)return;if(c.gender==='female')z.push(sp);else if(c.gender==='male')n.push(sp);});});
  const sIds=new Set(sibs.map(x=>x.id));
  const neps=Object.values(S.persons).filter(x=>(x.parents||[]).some(pid=>sIds.has(pid)));
  return{pars,sps,chs,sibs,aus,cous,gps,gcs,inLaws:{z,n,all:[...z,...n]},neps};
}
function getLines(){
  const spL=[],chL=[],seen=new Set();
  Object.values(S.persons).forEach(p=>{
    (p.spouses||[]).forEach(s=>{const k=[p.id,s.id].sort().join('|');if(!seen.has(k)&&S.pos[p.id]&&S.pos[s.id]){seen.add(k);spL.push({a:p.id,b:s.id});}});
    const vp=(p.parents||[]).filter(pid=>S.pos[pid]);
    if(vp.length&&S.pos[p.id])chL.push({child:p.id,parents:vp});
  });
  return{spL,chL};
}

function schedSave(){
  if(!S.loaded||!S.treeId||S.stage!=='tree')return;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    db.set('td:'+S.treeId,JSON.stringify({persons:S.persons,positions:S.pos}));
    S.treesIndex=S.treesIndex.map(t=>t.id===S.treeId?{...t,n:Object.keys(S.persons).length}:t);
    db.set('tidx',JSON.stringify(S.treesIndex));
  },600);
}

async function init(){
  render();
  let name=db.get('iname');
  let idx=null;try{const r=db.get('tidx');if(r)idx=JSON.parse(r);}catch(e){}
  if(!idx){
    idx=[{id:'default',title:'Наша семья',owner:'Семья',ts:Date.now(),n:Object.keys(INIT_P).length}];
    db.set('tidx',JSON.stringify(idx));
    db.set('td:default',JSON.stringify({persons:INIT_P,positions:INIT_POS}));
  }
  S.treesIndex=idx;
  if(!name){S.stage='identity';render();return;}
  S.ident=name;
  let lastId=db.get('last-tid');
  if(lastId&&idx.some(t=>t.id===lastId)){await loadTree(lastId);}
  else{S.stage='hub';render();}
}

async function loadTree(id){
  S.loaded=false;S.stage='tree';render();
  let data=null;try{const r=db.get('td:'+id);if(r)data=JSON.parse(r);}catch(e){}
  S.persons=data&&data.persons?data.persons:{};
  S.pos=data&&data.positions?data.positions:{};
  S.treeId=id;S.selId=null;S.editModal=null;S.search='';S.tr={x:390,y:90,k:.68};
  S.loaded=true;
  db.set('last-tid',id);
  render();
}

function render(){
  document.body.style.background=C().bg;
  const app=document.getElementById('app');
  if(S.stage==='loading'){renderLoading(app);return;}
  if(S.stage==='identity'){renderIdentity(app);return;}
  if(S.stage==='hub'){renderHub(app);return;}
  if(S.stage==='tree'){renderTreeScreen(app);return;}
}

function bindTreeEvents(){
  document.getElementById('backBtn').addEventListener('click',()=>{S.stage='hub';_pan=null;_drag=null;render();});
  document.getElementById('searchInp').addEventListener('input',e=>{S.search=e.target.value;renderCanvasContent();});
  document.getElementById('zInBtn').addEventListener('click',()=>{S.tr={...S.tr,k:Math.min(3,S.tr.k*1.2)};applyTransform();});
  document.getElementById('zOutBtn').addEventListener('click',()=>{S.tr={...S.tr,k:Math.max(0.1,S.tr.k*0.82)};applyTransform();});
  document.getElementById('homeBtn').addEventListener('click',()=>{S.tr={x:390,y:90,k:.68};applyTransform();});
  document.getElementById('darkBtn2').addEventListener('click',()=>{S.dark=!S.dark;render();});
  document.getElementById('importBtn').addEventListener('click',openImport);
  document.getElementById('addBtn').addEventListener('click',()=>{openEdit(null);});
  document.getElementById('pngBtn').addEventListener('click',exportPNG);

  const canvas=document.getElementById('canvas');
  canvas.addEventListener('mousedown',e=>{
    if(e.button!==0)return;
    if(e.target.closest('.grip'))return;
    if(e.target.closest('.card-el'))return;
    _pan={ox:e.clientX-S.tr.x,oy:e.clientY-S.tr.y};
    canvas.style.cursor='grabbing';
  });
  window.addEventListener('mousemove',onMouseMove);
  window.addEventListener('mouseup',onMouseUp);
  canvas.addEventListener('wheel',onWheel,{passive:false});
  canvas.addEventListener('touchstart',onTouchStart,{passive:false});
  canvas.addEventListener('touchmove',onTouchMove,{passive:false});
  canvas.addEventListener('touchend',onTouchEnd);
}

function onWheel(e){
  e.preventDefault();
  const canvas=document.getElementById('canvas');if(!canvas)return;
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const f=e.deltaY<0?1.1:0.9;
  const k=Math.max(0.1,Math.min(3,S.tr.k*f));
  S.tr={x:mx-(mx-S.tr.x)*(k/S.tr.k),y:my-(my-S.tr.y)*(k/S.tr.k),k};
  applyTransform();
}
function onMouseMove(e){
  if(_drag){
    const k=S.tr.k;
    const nx=_drag.px+(e.clientX-_drag.sx)/k;
    const ny=_drag.py+(e.clientY-_drag.sy)/k;
    S.pos={...S.pos,[_drag.id]:{x:nx,y:ny}};
    updateCardPos(_drag.id,nx,ny);
    updateLines();
    schedSave();
  }else if(_pan){
    S.tr={...S.tr,x:e.clientX-_pan.ox,y:e.clientY-_pan.oy};
    applyTransform();
  }
}
function onMouseUp(){
  _pan=null;_drag=null;
  const canvas=document.getElementById('canvas');if(canvas)canvas.style.cursor='grab';
}
function onTouchStart(e){
  if(e.touches.length===1){
    const t=e.touches[0];
    _touch={mode:'pan',ox:t.clientX-S.tr.x,oy:t.clientY-S.tr.y};
  }else if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    _touch={mode:'pinch',d:Math.hypot(dx,dy),k:S.tr.k,x:S.tr.x,y:S.tr.y};
  }
}
function onTouchMove(e){
  e.preventDefault();
  if(!_touch)return;
  if(_touch.mode==='pan'&&e.touches.length===1){
    S.tr={...S.tr,x:e.touches[0].clientX-_touch.ox,y:e.touches[0].clientY-_touch.oy};
    applyTransform();
  }else if(_touch.mode==='pinch'&&e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const k=Math.max(0.1,Math.min(3,_touch.k*Math.hypot(dx,dy)/_touch.d));
    S.tr={x:_touch.x,y:_touch.y,k};
    applyTransform();
  }
}
function onTouchEnd(){_touch=null;}

function applyTransform(){
  const cl=document.getElementById('cards-layer');
  if(cl)cl.style.transform=`translate(${S.tr.x}px,${S.tr.y}px) scale(${S.tr.k})`;
  const svg=document.getElementById('lines-svg');
  if(svg){const g=svg.querySelector('g');if(g)g.setAttribute('transform',`translate(${S.tr.x},${S.tr.y}) scale(${S.tr.k})`);}
  const sb=document.getElementById('scale-badge');
  if(sb)sb.textContent=Math.round(S.tr.k*100)+'%';
}

function updateCardPos(id,x,y){
  const el=document.getElementById('card-'+id);
  if(el){el.style.left=x+'px';el.style.top=y+'px';}
}

  spL.forEach(({a,b})=>{
    const pa=S.pos[a],pb=S.pos[b];if(!pa||!pb)return;
    const hi=S.selId&&(S.selId===a||S.selId===b);
    paths+=`<line x1="${pa.x+CW/2}" y1="${pa.y+CH/2}" x2="${pb.x+CW/2}" y2="${pb.y+CH/2}" stroke="${hi?c.as:c.ss}" stroke-width="${hi?2:1.5}" stroke-dasharray="5,4"/>`;
  });
  chL.forEach(({child,parents})=>{
    const cp=S.pos[child];if(!cp)return;
    let sx,sy;
    if(parents.length===1){const pp=S.pos[parents[0]];if(!pp)return;sx=pp.x+CW/2;sy=pp.y+CH;}
    else{const p1=S.pos[parents[0]],p2=S.pos[parents[1]];if(!p1||!p2)return;sx=(p1.x+p2.x)/2+CW/2;sy=Math.max(p1.y,p2.y)+CH/2;}
    const ex=cp.x+CW/2,ey=cp.y,my=(sy+ey)/2;
    const hi=S.selId&&(parents.includes(S.selId)||child===S.selId);
    paths+=`<path d="M${sx} ${sy} C${sx} ${my},${ex} ${my},${ex} ${ey}" fill="none" stroke="${hi?c.as:c.cs}" stroke-width="${hi?2:1.5}"/>`;
  });
  svg.innerHTML=`<g transform="translate(${S.tr.x},${S.tr.y}) scale(${S.tr.k})">${paths}</g>`;
}

function updateLines(){renderLines();}

function renderCards(){
  const cl=document.getElementById('cards-layer');if(!cl)return;
  const c=C();
  const q=S.search.toLowerCase().trim();
  const matchIds=q?new Set(Object.values(S.persons).filter(p=>(p.name+' '+p.surname).toLowerCase().includes(q)).map(p=>p.id)):null;
  let html='';
  Object.values(S.persons).forEach(p=>{
    const pp=S.pos[p.id];if(!pp)return;
    const isSel=S.selId===p.id;
    const isM=matchIds&&matchIds.has(p.id);
    const isDim=matchIds&&!isM;
    const[c1,c2]=gc(p.gender);
    const age=calcAge(p.birthDate,p.death);
    const ageStr=age!=null?' · '+age+' л.':'';
    const dates=[p.birthDate?'р. '+p.birthDate:'',p.death?'† '+p.death:''].filter(Boolean).join(' · ');
    const loc=[p.city,p.country].filter(Boolean).join(', ');
    html+=`<div id="card-${p.id}" class="card-el" data-id="${p.id}" style="position:absolute;left:${pp.x}px;top:${pp.y}px;width:${CW}px;height:${CH}px;
      background:${isSel?c.cardSel:c.card};
      border:1px solid ${isSel?'#6366f1':isM?'#f59e0b':c.border};
      border-radius:10px;backdrop-filter:blur(12px);padding:9px 10px;
      pointer-events:auto;cursor:pointer;box-sizing:border-box;user-select:none;
      box-shadow:${isSel?'0 0 0 2px rgba(99,102,241,0.45),0 8px 32px rgba(0,0,0,0.25)':'0 2px 10px rgba(0,0,0,0.14)'};
      opacity:${isDim?0.18:1};transition:opacity .2s">
      <div class="grip" data-id="${p.id}" style="position:absolute;top:0;left:0;width:22px;height:${CH}px;display:flex;align-items:center;justify-content:center;cursor:grab;border-radius:10px 0 0 10px;z-index:2">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="${c.muted}"><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg>
      </div>
      <div class="card-body" data-id="${p.id}" style="padding-left:14px">
        <div style="display:flex;align-items:flex-start;gap:7px">
          ${avatarSVG(p,31)}
          <div style="flex:1;overflow:hidden">
            <div style="font-size:10.5px;font-weight:700;color:${c.text};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3">${esc(p.name||'—')}</div>
            <div style="font-size:9.5px;color:${c.sub};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35">${esc(p.surname||'')}</div>
          </div>
        </div>
        ${dates||age!=null?`<div style="margin-top:5px;font-size:8.5px;color:${c.muted};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(dates+ageStr)}</div>`:''}
        ${loc?`<div style="font-size:8.5px;color:${c.muted};opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(loc)}</div>`:''}
      </div>
      ${p.death?`<div style="position:absolute;top:7px;right:7px;width:6px;height:6px;border-radius:50%;background:#64748b"></div>`:''}
    </div>`;
  });
  cl.innerHTML=html;
  cl.style.pointerEvents='none';
  // Attach events
  cl.querySelectorAll('.card-body').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const id=el.dataset.id;
      S.selId=S.selId===id?null:id;
      renderCards();
      updateLines();
      renderDetailPanel();
    });
    el.addEventListener('mousedown',e=>e.stopPropagation());
  });
  cl.querySelectorAll('.grip').forEach(el=>{
    el.addEventListener('mousedown',e=>{
      e.stopPropagation();e.preventDefault();
      const id=el.dataset.id;const pp=S.pos[id];
      _drag={id,sx:e.clientX,sy:e.clientY,px:pp.x,py:pp.y};
      document.body.style.cursor='grabbing';
    });
    // Touch drag
    el.addEventListener('touchstart',e=>{
      e.stopPropagation();
      if(e.touches.length!==1)return;
      const id=el.dataset.id;const pp=S.pos[id];
      _touch=null;
      _drag={id,sx:e.touches[0].clientX,sy:e.touches[0].clientY,px:pp.x,py:pp.y};
    },{passive:true});
  });
  // Touch move/end for cards
  cl.addEventListener('touchmove',e=>{
    if(!_drag||e.touches.length!==1)return;
    e.preventDefault();
    const k=S.tr.k;
    const nx=_drag.px+(e.touches[0].clientX-_drag.sx)/k;
    const ny=_drag.py+(e.touches[0].clientY-_drag.sy)/k;
    S.pos={...S.pos,[_drag.id]:{x:nx,y:ny}};
    updateCardPos(_drag.id,nx,ny);
    updateLines();
    schedSave();
  },{passive:false});
  cl.addEventListener('touchend',()=>{_drag=null;});
}

//  EDIT MODAL
// ═══════════════════════════════════════
function openEdit(person){
  if(person){
    S.ef={...person};
    S.ePar=[...(person.parents||[])];
    S.eSp=(person.spouses||[]).map(s=>s.id);
    S.eCh=Object.values(S.persons).filter(x=>(x.parents||[]).includes(person.id)).map(x=>x.id);
  }else{
    const id='p'+Date.now();
    S.ef={id,name:'',surname:'',birthDate:'',death:'',city:'',country:'',bio:'',gender:'male',parents:[],spouses:[]};
    S.ePar=[];S.eSp=[];S.eCh=[];
  }
  S.editModal=person?person.id:'new';
  S.pickerOpen=null;S.pickerQ='';
  renderEditModal();
}

function renderEditModal(){
  const m=document.getElementById('modals');if(!m)return;
  if(!S.editModal){m.innerHTML='';return;}
  const c=C();
  const ef=S.ef;
  const IS=`width:100%;box-sizing:border-box;padding:7px 10px;border-radius:8px;border:1px solid ${c.border};background:${c.inp};color:${c.text};font-size:12px;outline:none`;
  const genders=[['male','Мужской','#6366f1'],['female','Женский','#ec4899'],['unknown','Неизвестно','#0ea5e9']];
  const selPar=S.ePar.map(id=>S.persons[id]).filter(Boolean);
  const selSp=S.eSp.map(id=>S.persons[id]).filter(Boolean);
  const selCh=S.eCh.map(id=>S.persons[id]).filter(Boolean);

  function chipRow(items,color,type){
    if(!items.length)return'';
    return items.map(p=>`<div style="display:inline-flex;align-items:center;gap:4px;padding:3px 6px 3px 4px;border-radius:20px;background:${color}18;border:1px solid ${color}40;font-size:10.5px;color:${color};margin:2px">${avatarSVG(p,16)}<span>${esc(p.name)} ${esc(p.surname)}</span><span class="rm-rel" data-type="${type}" data-id="${p.id}" style="cursor:pointer;margin-left:2px">×</span></div>`).join('');
  }

  function pickerSection(type,label,color,items,max){
    const isOpen=S.pickerOpen===type;
    const q=isOpen?S.pickerQ:'';
    const exclude=[ef.id,...(type==='parents'?S.eCh:type==='spouses'?[]:[...S.ePar])];
    const filtered=Object.values(S.persons).filter(p=>!exclude.includes(p.id)&&(p.name+' '+p.surname).toLowerCase().includes(q.toLowerCase())).slice(0,30);
    return`<div style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <label style="font-size:11px;color:${c.sub};font-weight:600">${esc(label)}</label>
        <button class="toggle-picker" data-type="${type}" style="font-size:10px;padding:2px 8px;border-radius:6px;border:1px solid ${isOpen?color:c.border};background:${isOpen?color+'18':'transparent'};color:${isOpen?color:c.muted};cursor:pointer">${isOpen?'Скрыть':'+ Добавить'}</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:2px;min-height:4px">${chipRow(items,color,type)}</div>
      ${isOpen?`<div style="border:1px solid ${c.border};border-radius:10px;overflow:hidden;margin-top:4px">
        <div style="position:relative;padding:5px 8px;border-bottom:1px solid ${c.border}">
          <input id="pickerQ" value="${esc(q)}" placeholder="Поиск…" style="width:100%;box-sizing:border-box;padding:3px 3px 3px 20px;border:none;background:transparent;color:${c.text};font-size:11px;outline:none"/>
        </div>
        <div style="max-height:130px;overflow-y:auto">${filtered.length===0?`<div style="padding:8px;text-align:center;font-size:11px;color:${c.muted}">Не найдено</div>`:filtered.map(p=>{
          const isSel=(type==='parents'?S.ePar:type==='spouses'?S.eSp:S.eCh).includes(p.id);
          const isDis=!isSel&&max&&(type==='parents'?S.ePar:type==='spouses'?S.eSp:S.eCh).length>=max;
          return`<div class="picker-item" data-type="${type}" data-id="${p.id}" style="display:flex;align-items:center;gap:8px;padding:5px 10px;cursor:${isDis?'not-allowed':'pointer'};opacity:${isDis?.4:1};background:${isSel?color+'18':'transparent'}">${avatarSVG(p,20)}<span style="font-size:11px;flex:1;color:${c.text}">${esc(p.name)} ${esc(p.surname)}</span>${isSel?`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`:''}</div>`;
        }).join('')}</div>
      </div>`:''}
    </div>`;
  }

  m.innerHTML=`<div class="modal-backdrop" id="edit-backdrop">
    <div class="fade" style="width:100%;max-width:420px;max-height:90vh;overflow-y:auto;background:${c.modal};border-radius:16px;padding:20px;border:1px solid ${c.border};box-shadow:0 30px 100px rgba(0,0,0,0.5)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 style="color:${c.text};font-size:15px;margin:0;font-weight:800">${S.editModal==='new'?'Добавить человека':'Редактировать'}</h2>
        <button id="closeEdit" style="background:none;border:none;cursor:pointer;color:${c.muted};display:flex">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div style="margin-bottom:12px">
        <label style="font-size:11px;color:${c.sub};display:block;margin-bottom:4px;font-weight:600">Пол</label>
        <div style="display:flex;gap:6px">
          ${genders.map(([v,l,col])=>`<button class="gender-btn" data-val="${v}" data-col="${col}" style="flex:1;padding:6px 2px;border-radius:8px;font-size:10.5px;font-weight:600;border:1px solid ${ef.gender===v?col:c.border};background:${ef.gender===v?col+'22':'transparent'};color:${ef.gender===v?col:c.sub};cursor:pointer">${l}</button>`).join('')}
        </div>
      </div>
      ${[['name','Имя'],['surname','Фамилия'],['birthDate','Дата рождения (ДД.ММ.ГГГГ)'],['death','Год смерти'],['city','Город'],['country','Страна']].map(([k,l])=>`<div style="margin-bottom:9px"><label style="font-size:11px;color:${c.sub};display:block;margin-bottom:3px;font-weight:600">${l}</label><input class="ef-inp" data-key="${k}" value="${esc(ef[k]||'')}" style="${IS}"/></div>`).join('')}
      <div style="margin-bottom:12px"><label style="font-size:11px;color:${c.sub};display:block;margin-bottom:3px;font-weight:600">Биография</label><textarea class="ef-inp" data-key="bio" rows="2" style="${IS};resize:vertical">${esc(ef.bio||'')}</textarea></div>
      <div style="border-top:1px solid ${c.border};padding-top:12px">
        ${pickerSection('parents','Родители (макс. 2)','#6366f1',selPar,2)}
      </div>
      <div style="border-top:1px solid ${c.border};padding-top:12px">
        ${pickerSection('spouses','Супруги','#f43f5e',selSp,null)}
      </div>
      <div style="border-top:1px solid ${c.border};padding-top:12px;margin-bottom:14px">
        ${pickerSection('children','Дети','#10b981',selCh,null)}
      </div>
      <div style="display:flex;gap:8px">
        <button id="saveEdit" style="flex:1;padding:10px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff;font-size:13px;font-weight:700">Сохранить</button>
        ${S.editModal!=='new'?`<button id="delPerson" style="padding:10px 14px;border-radius:10px;background:transparent;border:1px solid #ef4444;color:#ef4444;font-size:12px;cursor:pointer">Удалить</button>`:''}
      </div>
    </div>
  </div>`;

  // Events
  document.getElementById('closeEdit').addEventListener('click',()=>{S.editModal=null;m.innerHTML='';});
  document.getElementById('edit-backdrop').addEventListener('click',e=>{if(e.target.id==='edit-backdrop'){S.editModal=null;m.innerHTML='';}});
  document.querySelectorAll('.ef-inp').forEach(el=>{
    el.addEventListener('input',e=>{S.ef={...S.ef,[el.dataset.key]:e.target.value};});
  });
  document.querySelectorAll('.gender-btn').forEach(el=>{
    el.addEventListener('click',()=>{S.ef={...S.ef,gender:el.dataset.val};renderEditModal();});
  });
  document.querySelectorAll('.toggle-picker').forEach(el=>{
    el.addEventListener('click',()=>{
      S.pickerOpen=S.pickerOpen===el.dataset.type?null:el.dataset.type;
      S.pickerQ='';renderEditModal();
      if(S.pickerOpen){setTimeout(()=>{const i=document.getElementById('pickerQ');if(i)i.focus();},50);}
    });
  });
  const pq=document.getElementById('pickerQ');
  if(pq){pq.addEventListener('input',e=>{S.pickerQ=e.target.value;renderEditModal();});}
  document.querySelectorAll('.picker-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const{type,id}=el.dataset;
      const arr=type==='parents'?S.ePar:type==='spouses'?S.eSp:S.eCh;
      const maxOk=type!=='parents'||arr.length<2;
      if(arr.includes(id)){
        const newArr=arr.filter(x=>x!==id);
        if(type==='parents')S.ePar=newArr;else if(type==='spouses')S.eSp=newArr;else S.eCh=newArr;
      }else if(maxOk){
        arr.push(id);
      }
      renderEditModal();
    });
  });
  document.querySelectorAll('.rm-rel').forEach(el=>{
    el.addEventListener('click',()=>{
      const{type,id}=el.dataset;
      if(type==='parents')S.ePar=S.ePar.filter(x=>x!==id);
      else if(type==='spouses')S.eSp=S.eSp.filter(x=>x!==id);
      else S.eCh=S.eCh.filter(x=>x!==id);
      renderEditModal();
    });
  });
  document.getElementById('saveEdit').addEventListener('click',doSave);
  const delBtn=document.getElementById('delPerson');
  if(delBtn)delBtn.addEventListener('click',()=>{if(confirm('Удалить?'))doDelPerson(S.ef.id);});
}

function doSave(){
  const id=S.ef.id;
  const updated={...S.ef,parents:[...S.ePar],spouses:S.eSp.map(sid=>({id:sid}))};
  const newPersons={...S.persons,[id]:updated};
  S.eCh.forEach(cid=>{if(newPersons[cid]&&!newPersons[cid].parents.includes(id))newPersons[cid]={...newPersons[cid],parents:[...newPersons[cid].parents,id]};});
  Object.values(S.persons).filter(p=>(p.parents||[]).includes(id)&&p.id!==id).forEach(c=>{if(!S.eCh.includes(c.id)&&newPersons[c.id])newPersons[c.id]={...newPersons[c.id],parents:newPersons[c.id].parents.filter(pid=>pid!==id)};});
  S.eSp.forEach(sid=>{if(newPersons[sid]&&!(newPersons[sid].spouses||[]).some(s=>s.id===id))newPersons[sid]={...newPersons[sid],spouses:[...(newPersons[sid].spouses||[]),{id}]};});
  (S.persons[id]?.spouses||[]).map(s=>s.id).forEach(sid=>{if(!S.eSp.includes(sid)&&newPersons[sid])newPersons[sid]={...newPersons[sid],spouses:(newPersons[sid].spouses||[]).filter(s=>s.id!==id)};});
  S.persons=newPersons;
  if(!S.pos[id])S.pos={...S.pos,[id]:{x:300,y:300}};
  S.editModal=null;
  document.getElementById('modals').innerHTML='';
  renderCanvasContent();
  renderDetailPanel();
  schedSave();
}

function doDelPerson(id){
  const{[id]:_,...rest}=S.persons;S.persons=rest;
  const{[id]:__,...posRest}=S.pos;S.pos=posRest;
  S.selId=null;S.editModal=null;
  document.getElementById('modals').innerHTML='';
  renderCanvasContent();
  renderDetailPanel();
  schedSave();
}

// ═══════════════════════════════════════
//  IMPORT MODAL
// ═══════════════════════════════════════
async function openImport(){
  S.importModal=true;S.importSel=null;S.importQ='';S.importBusy=true;
  renderImportModal();
  const cache={};
  for(const t of S.treesIndex.filter(t=>t.id!==S.treeId)){
    try{const r=db.get('td:'+t.id);if(r)cache[t.id]=JSON.parse(r);}catch(e){}
  }
  S.treeCache=cache;S.importBusy=false;
  renderImportModal();
}
function renderImportModal(){
  const m=document.getElementById('modals');if(!m)return;
  if(!S.importModal){if(!S.editModal)m.innerHTML='';return;}
  const c=C();
  const q=S.importQ.toLowerCase();
  const res=q?Object.entries(S.treeCache).flatMap(([tid,data])=>{
    const title=(S.treesIndex.find(t=>t.id===tid)||{}).title||tid;
    return Object.values(data.persons||{}).filter(p=>(p.name+' '+p.surname).toLowerCase().includes(q)).map(p=>({tid,title,person:p}));
  }).slice(0,25):[];
  const IS=`width:100%;box-sizing:border-box;padding:7px 10px;border-radius:8px;border:1px solid ${c.border};background:${c.inp};color:${c.text};font-size:12px;outline:none`;
  m.innerHTML=`<div class="modal-backdrop" id="imp-back">
    <div class="fade" style="width:100%;max-width:400px;max-height:80vh;overflow-y:auto;background:${c.modal};border-radius:16px;padding:20px;border:1px solid ${c.border};box-shadow:0 30px 100px rgba(0,0,0,0.5)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h2 style="color:${c.text};font-size:15px;margin:0;font-weight:800">Найти общего родственника</h2>
        <button id="closeImp" style="background:none;border:none;cursor:pointer;color:${c.muted};display:flex"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <p style="font-size:12px;color:${c.sub};margin:0 0 12px;line-height:1.5">Поиск по всем вашим деревьям. Импортируйте ветку и свяжите через редактирование.</p>
      ${S.importSel?`
        <div style="display:flex;align-items:center;gap:10px;padding:12px;background:${c.inp};border-radius:10px;margin-bottom:12px">${avatarSVG(S.importSel.person,36)}<div><div style="font-size:13px;font-weight:700;color:${c.text}">${esc(S.importSel.person.name)} ${esc(S.importSel.person.surname)}</div><div style="font-size:11px;color:${c.sub}">Дерево «${esc(S.importSel.title)}»</div></div></div>
        <p style="font-size:12px;color:${c.sub};margin-bottom:14px;line-height:1.5">Будет импортировано ${Object.keys((S.treeCache[S.importSel.tid]||{}).persons||{}).length} чел.</p>
        <div style="display:flex;gap:8px">
          <button id="doImport" style="flex:1;padding:10px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff;font-size:13px;font-weight:700">Импортировать ветку</button>
          <button id="backImp" style="padding:10px 14px;border-radius:10px;background:transparent;border:1px solid ${c.border};color:${c.sub};font-size:12px">Назад</button>
        </div>
      `:`
        <input id="impQ" value="${esc(S.importQ)}" placeholder="Имя или фамилия…" style="${IS};margin-bottom:10px"/>
        ${S.importBusy?`<div style="text-align:center;font-size:12px;color:${c.muted};padding:14px">Загрузка…</div>`:''}
        ${!S.importBusy&&S.treesIndex.length<=1?`<div style="text-align:center;font-size:12px;color:${c.muted};padding:14px">Других деревьев нет</div>`:''}
        ${!S.importBusy&&S.importQ&&!res.length?`<div style="text-align:center;font-size:12px;color:${c.muted};padding:14px">Не найдено</div>`:''}
        ${res.map(r=>`<div class="imp-item" data-idx="${res.indexOf(r)}" style="display:flex;align-items:center;gap:10px;padding:8px 6px;border-radius:8px;cursor:pointer">${avatarSVG(r.person,28)}<div style="flex:1;min-width:0"><div style="font-size:12.5px;font-weight:600;color:${c.text}">${esc(r.person.name)} ${esc(r.person.surname)}</div><div style="font-size:10.5px;color:${c.muted}">Дерево «${esc(r.title)}»</div></div><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${c.muted}" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>`).join('')}
      `}
    </div>
  </div>`;
  // Store res for access in click handlers
  window._impRes=res;
  document.getElementById('closeImp').addEventListener('click',()=>{S.importModal=false;m.innerHTML='';});
  document.getElementById('imp-back').addEventListener('click',e=>{if(e.target.id==='imp-back'){S.importModal=false;m.innerHTML='';}});
  const qEl=document.getElementById('impQ');
  if(qEl){qEl.addEventListener('input',e=>{S.importQ=e.target.value;renderImportModal();});qEl.focus();}
  document.querySelectorAll('.imp-item').forEach(el=>{
    el.addEventListener('click',()=>{S.importSel=window._impRes[+el.dataset.idx];renderImportModal();});
  });
  const doImpBtn=document.getElementById('doImport');
  if(doImpBtn)doImpBtn.addEventListener('click',()=>{
    const{tid,person,title}=S.importSel;
    const data=S.treeCache[tid];if(!data)return;
    const idMap={};Object.keys(data.persons||{}).forEach(oid=>{idMap[oid]='imp_'+tid+'_'+oid;});
    const rp={};
    Object.values(data.persons||{}).forEach(p=>{rp[idMap[p.id]]={...p,id:idMap[p.id],parents:(p.parents||[]).map(pid=>idMap[pid]).filter(Boolean),spouses:(p.spouses||[]).map(s=>({...s,id:idMap[s.id]})).filter(s=>s.id)};});
    const cv=Object.values(S.pos);const cmx=cv.length?Math.min(...cv.map(p=>p.x)):0;const cmy=cv.length?Math.max(...cv.map(p=>p.y)):0;
    const sv=Object.values(data.positions||{});const smx=sv.length?Math.min(...sv.map(p=>p.x)):0;const smy=sv.length?Math.min(...sv.map(p=>p.y)):0;
    const rpos={};Object.entries(data.positions||{}).forEach(([oid,p])=>{if(idMap[oid])rpos[idMap[oid]]={x:p.x+(cmx-smx),y:p.y+(cmy+260-smy)};});
    S.persons={...S.persons,...rp};S.pos={...S.pos,...rpos};
    S.selId=idMap[person.id];
    S.importModal=false;m.innerHTML='';
    renderCanvasContent();renderDetailPanel();
    showToast('Ветка «'+title+'» импортирована ('+Object.keys(data.persons||{}).length+' чел.).');
    schedSave();
  });
  const backImpBtn=document.getElementById('backImp');
  if(backImpBtn)backImpBtn.addEventListener('click',()=>{S.importSel=null;renderImportModal();});
}

// ═══════════════════════════════════════

// ═══════════════════════════════════════
function exportPNG(){
  const margin=60,sc=2;
  const all=Object.entries(S.pos).filter(([id])=>S.persons[id]);if(!all.length)return;
  const xs=all.map(([,p])=>p.x),ys=all.map(([,p])=>p.y);
  const mnX=Math.min(...xs)-margin,mnY=Math.min(...ys)-margin;
  const W=Math.max(...xs)+CW+margin-mnX,H=Math.max(...ys)+CH+margin-mnY;
  const cv=document.createElement('canvas');cv.width=W*sc;cv.height=H*sc;
  const ctx=cv.getContext('2d');ctx.scale(sc,sc);ctx.translate(-mnX,-mnY);
  ctx.fillStyle=S.dark?'#070b18':'#eef0f5';ctx.fillRect(mnX,mnY,W,H);
  const{spL,chL}=getLines();
  spL.forEach(({a,b})=>{const pa=S.pos[a],pb=S.pos[b];if(!pa||!pb)return;ctx.save();ctx.setLineDash([5,4]);ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pa.x+CW/2,pa.y+CH/2);ctx.lineTo(pb.x+CW/2,pb.y+CH/2);ctx.stroke();ctx.restore();});
  chL.forEach(({child,parents})=>{const cp=S.pos[child];if(!cp)return;let sx,sy;if(parents.length===1){const pp=S.pos[parents[0]];if(!pp)return;sx=pp.x+CW/2;sy=pp.y+CH;}else{const p1=S.pos[parents[0]],p2=S.pos[parents[1]];if(!p1||!p2)return;sx=(p1.x+p2.x)/2+CW/2;sy=Math.max(p1.y,p2.y)+CH/2;}const ex=cp.x+CW/2,ey=cp.y,my=(sy+ey)/2;ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1.5;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(sx,sy);ctx.bezierCurveTo(sx,my,ex,my,ex,ey);ctx.stroke();});
  Object.values(S.persons).forEach(p=>{const pp=S.pos[p.id];if(!pp)return;ctx.fillStyle=S.dark?'rgba(18,25,60,0.95)':'rgba(255,255,255,0.95)';ctx.strokeStyle=S.dark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.1)';ctx.lineWidth=1;ctx.setLineDash([]);ctx.beginPath();const r=10;const x=pp.x,y=pp.y,w=CW,h=CH;ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fill();ctx.stroke();const[c1,c2]=gc(p.gender);const g=ctx.createLinearGradient(pp.x+10,pp.y+10,pp.x+36,pp.y+36);g.addColorStop(0,c1);g.addColorStop(1,c2);ctx.fillStyle=g;ctx.beginPath();ctx.arc(pp.x+22,pp.y+28,13,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText((p.name||'?')[0],pp.x+22,pp.y+32);ctx.textAlign='left';ctx.fillStyle=S.dark?'#dde2f0':'#1a2035';ctx.font='bold 10px sans-serif';ctx.fillText((p.name||'').slice(0,16),pp.x+40,pp.y+22);ctx.fillStyle=S.dark?'#8b95b0':'#5a6380';ctx.font='9px sans-serif';ctx.fillText((p.surname||'').slice(0,16),pp.x+40,pp.y+33);const age=calcAge(p.birthDate,p.death);const d=[p.birthDate?'р. '+p.birthDate:'',p.death?'† '+p.death:'',age!=null?'('+age+')':''].filter(Boolean).join(' · ');ctx.fillStyle=S.dark?'#4a5270':'#9aa0b8';ctx.font='8.5px sans-serif';if(d)ctx.fillText(d.slice(0,26),pp.x+10,pp.y+58);const loc=[p.city,p.country].filter(Boolean).join(', ');if(loc)ctx.fillText(loc.slice(0,24),pp.x+10,pp.y+70);});
  cv.toBlob(blob=>{const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='family-tree.png';a.click();URL.revokeObjectURL(url);},'image/png');
}
