    try { const v = localStorage.getItem(key); return v !== null ? { value: v } : null; } catch(e){ return null; }

    try { localStorage.setItem(key, value); return true; } catch(e){ return false; }

const GC={male:["#6366f1","#818cf8"],female:["#ec4899","#f472b6"],unknown:["#0ea5e9","#38bdf8"]};
const gc=g=>GC[g]||GC.unknown;

function calcAge(b,d){
  if(!b)return null;
  const p=b.split(".");if(p.length<3)return null;
  const dy=parseInt(p[0],10),m=parseInt(p[1],10),y=parseInt(p[2],10);
  if(!y||isNaN(y))return null;
  if(d){const yd=parseInt(d,10);if(!isNaN(yd))return yd-y>=0?yd-y:null;}
  const now=new Date();let age=now.getFullYear()-y;
  const hadB=now.getMonth()>(m-1)||(now.getMonth()===(m-1)&&now.getDate()>=dy);
  if(!hadB)age--;return age>=0?age:null;
}
function ageLabel(a){
  if(a===null||a===undefined)return"";
  const m10=a%10,m100=a%100;
  if(m100>=11&&m100<=14)return`${a} лет`;
  if(m10===1)return`${a} год`;
  if(m10>=2&&m10<=4)return`${a} года`;
  return`${a} лет`;
}
function gbd(items,mw,fw,ow="родств."){
  const m=items.filter(p=>p.gender==="male").length;
  const f=items.filter(p=>p.gender==="female").length;
  const o=items.length-m-f;
  return[m?`${m} ${mw}`:"",f?`${f} ${fw}`:"",o?`${o} ${ow}`:""].filter(Boolean).join(" · ");
}

function Avatar({person,size=34}){
  const[c1,c2]=gc(person.gender);
  return <div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,background:`linear-gradient(135deg,${c1},${c2})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:size*0.38,userSelect:"none"}}>{(person.name||"?")[0]}</div>;
}

function PersonPicker({C,persons,excludeIds=[],selectedIds=[],onToggle,maxItems,color="#6366f1"}){
  const[q,setQ]=useState("");
  const filtered=useMemo(()=>Object.values(persons).filter(p=>!excludeIds.includes(p.id)&&`${p.name} ${p.surname}`.toLowerCase().includes(q.toLowerCase())).slice(0,40),[persons,excludeIds,q]);
  return(
    <div style={{border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",marginTop:4}}>
      <div style={{padding:"6px 8px",borderBottom:`1px solid ${C.border}`,position:"relative"}}>
        <Search size={11} style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:C.muted}}/>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Поиск..." style={{width:"100%",boxSizing:"border-box",padding:"4px 4px 4px 22px",border:"none",background:"transparent",color:C.text,fontSize:11,outline:"none",fontFamily:"inherit"}}/>
      </div>
      <div style={{maxHeight:140,overflowY:"auto"}}>
        {filtered.length===0&&<div style={{padding:"8px 10px",fontSize:11,color:C.muted,textAlign:"center"}}>Не найдено</div>}
        {filtered.map(p=>{
          const isSel=selectedIds.includes(p.id);
          const isDis=!isSel&&maxItems&&selectedIds.length>=maxItems;
          return(<div key={p.id} onClick={()=>!isDis&&onToggle(p.id,!isSel)} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",cursor:isDis?"not-allowed":"pointer",opacity:isDis?0.4:1,background:isSel?`${color}18`:"transparent"}}>
            <Avatar person={p} size={20}/>
            <span style={{fontSize:11,flex:1,color:C.text}}>{p.name} {p.surname}</span>
            {isSel&&<Check size={12} color={color}/>}
          </div>);
        })}
      </div>
    </div>
  );
}

function RelSection({C,label,color,selectedIds,persons,excludeIds,maxItems,onToggle}){
  const[open,setOpen]=useState(false);
  const selected=selectedIds.map(id=>persons[id]).filter(Boolean);
  return(
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
        <label style={{fontSize:11,color:C.sub,fontWeight:600}}>{label}</label>
        <button onClick={()=>setOpen(o=>!o)} style={{fontSize:10,padding:"2px 8px",borderRadius:6,border:`1px solid ${open?color:C.border}`,background:open?`${color}18`:"transparent",color:open?color:C.muted,cursor:"pointer",fontFamily:"inherit"}}>{open?"Скрыть":"+ Добавить"}</button>
      </div>
      {selected.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:open?6:0}}>{selected.map(p=>(<div key={p.id} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 6px 3px 4px",borderRadius:20,background:`${color}18`,border:`1px solid ${color}40`,fontSize:10.5,color}}><Avatar person={p} size={16}/><span>{p.name} {p.surname}</span><X size={10} style={{cursor:"pointer",marginLeft:2}} onClick={()=>onToggle(p.id,false)}/></div>))}</div>}
      {open&&<PersonPicker C={C} persons={persons} excludeIds={excludeIds} selectedIds={selectedIds} onToggle={onToggle} maxItems={maxItems} color={color}/>}
    </div>
  );
}

function rrect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

      </div>
      <div style={{maxWidth:640,margin:"0 auto",padding:"24px 18px"}}>
        <button onClick={()=>setNewTreeModal(true)} style={{width:"100%",padding:"14px",borderRadius:14,border:`1.5px dashed ${C.border}`,background:"transparent",color:C.sub,cursor:"pointer",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:18,fontFamily:"inherit"}}><Plus size={16}/> Создать новое дерево</button>
        {[...treesIndex].sort((a,b)=>b.createdAt-a.createdAt).map(t=>(
          <div key={t.id} onClick={()=>loadTreeData(t.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderRadius:14,background:C.card,border:`1px solid ${C.border}`,backdropFilter:"blur(12px)",cursor:"pointer",marginBottom:10}}>
            <div style={{width:40,height:40,borderRadius:11,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Users size={18} color="#fff"/></div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13.5,fontWeight:700,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.title}</div>
              <div style={{fontSize:11,color:C.sub}}>Автор: {t.owner} · {t.count||0} чел.</div>
            </div>
            <button onClick={e=>{e.stopPropagation();deleteTree(t.id);}} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,padding:6,display:"flex"}}><Trash2 size={15}/></button>
            <ChevronRight size={16} color={C.muted}/>
          </div>
        ))}
      </div>
      {newTreeModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",backdropFilter:"blur(6px)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.target===e.currentTarget&&setNewTreeModal(false)}>
          <div style={{width:"100%",maxWidth:360,background:C.modal,borderRadius:16,padding:22,border:`1px solid ${C.border}`,boxShadow:"0 30px 100px rgba(0,0,0,0.5)"}}>
            <h2 style={{color:C.text,fontSize:15,margin:"0 0 14px",fontWeight:800}}>Новое дерево</h2>
            <input value={newTreeTitle} onChange={e=>setNewTreeTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createTree()} placeholder="Например: Семья Ивановых" autoFocus style={{...iStyle,marginBottom:14}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={createTree} style={{flex:1,padding:9,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit"}}>Создать</button>
              <button onClick={()=>setNewTreeModal(false)} style={{padding:"9px 16px",borderRadius:10,background:"transparent",border:`1px solid ${C.border}`,color:C.sub,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Отмена</button>
            </div>
          </div>
        </div>
      )}
      <style>{spinStyle}</style>
    </div>
  );

  if(!loaded)return(<div style={{width:"100vw",height:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,fontFamily:"sans-serif"}}><div style={{width:34,height:34,borderRadius:"50%",border:"3px solid rgba(99,102,241,0.22)",borderTopColor:"#6366f1",animation:"spin 0.8s linear infinite"}}/><div style={{color:C.sub,fontSize:13}}>Загрузка дерева…</div><style>{spinStyle}</style></div>);

  return(
    <div style={{width:"100vw",height:"100vh",background:C.bg,fontFamily:"'Segoe UI',system-ui,sans-serif",overflow:"hidden",position:"relative"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,zIndex:200,background:C.hdr,backdropFilter:"blur(20px) saturate(1.4)",borderBottom:`1px solid ${C.border}`,padding:"9px 14px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <button onClick={()=>setStage("hub")} style={bBase}><ArrowLeft size={14}/></button>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <div style={{width:30,height:30,borderRadius:9,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center"}}><Users size={15} color="#fff"/></div>
          <span style={{color:C.text,fontWeight:800,fontSize:15,maxWidth:140,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{currentTree?.title||"Семейное Древо"}</span>
        </div>
        <div style={{flex:1,minWidth:120,maxWidth:230,position:"relative"}}>
          <Search size={13} style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:C.muted}}/>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Поиск…" style={{...iStyle,paddingLeft:30,borderRadius:20}}/>
          {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:C.muted,padding:0,display:"flex"}}><X size={12}/></button>}
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center",marginLeft:"auto",flexWrap:"wrap"}}>
          <button onClick={()=>setTr(p=>({...p,k:Math.min(3,p.k*1.2)}))} style={bBase}><ZoomIn size={14}/></button>
          <button onClick={()=>setTr(p=>({...p,k:Math.max(0.1,p.k*0.82)}))} style={bBase}><ZoomOut size={14}/></button>
          <button onClick={()=>setTr({x:390,y:90,k:0.68})} style={bBase}><Home size={14}/></button>
          <div style={{width:1,height:20,background:C.border}}/>
          <button onClick={()=>setDark(d=>!d)} style={{...bBase,color:dark?"#fbbf24":"#6366f1"}}>{dark?<Sun size={14}/>:<Moon size={14}/>}</button>
          <button onClick={openImportModal} style={bBase} title="Найти общего родственника"><GitBranch size={14}/></button>
          <button onClick={openNew} style={{...bBase,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",color:"#fff",borderRadius:18,padding:"6px 13px"}}><Plus size={13}/> Добавить</button>
          <button onClick={exportPNG} style={bBase}><Download size={14}/> PNG</button>
        </div>
      </div>

      {toast&&<div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",zIndex:500,background:C.panel,backdropFilter:"blur(20px)",border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 16px",fontSize:12,color:C.text,maxWidth:340,textAlign:"center",boxShadow:"0 12px 40px rgba(0,0,0,0.3)",animation:"slideUp 0.2s ease"}}>{toast}</div>}

      <div ref={containerRef} style={{position:"absolute",inset:0,top:52,overflow:"hidden",touchAction:"none",cursor:"grab"}}
        onMouseDown={onCanvasMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
        <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}}>
          <g transform={`translate(${tr.x},${tr.y}) scale(${tr.k})`}>
            {spouseLines.map(({a,b})=>{const pa=positions[a],pb=positions[b];if(!pa||!pb)return null;const hi=selectedId&&(selectedId===a||selectedId===b);return<line key={`s-${a}-${b}`} x1={pa.x+CW/2} y1={pa.y+CH/2} x2={pb.x+CW/2} y2={pb.y+CH/2} stroke={hi?C.accentStroke:C.spouseStroke} strokeWidth={hi?2:1.5} strokeDasharray="5,4"/>;})}
            {childLines.map(({child,parents})=>{const cp=positions[child];if(!cp)return null;let sx,sy;if(parents.length===1){const pp=positions[parents[0]];if(!pp)return null;sx=pp.x+CW/2;sy=pp.y+CH;}else{const p1=positions[parents[0]],p2=positions[parents[1]];if(!p1||!p2)return null;sx=(p1.x+p2.x)/2+CW/2;sy=Math.max(p1.y,p2.y)+CH/2;}const ex=cp.x+CW/2,ey=cp.y,my=(sy+ey)/2;const hi=selectedId&&(parents.includes(selectedId)||child===selectedId);return<path key={`c-${child}`} d={`M${sx} ${sy} C${sx} ${my},${ex} ${my},${ex} ${ey}`} fill="none" stroke={hi?C.accentStroke:C.childStroke} strokeWidth={hi?2:1.5}/>;})}
          </g>
        </svg>
        <div style={{position:"absolute",top:0,left:0,transformOrigin:"0 0",transform:`translate(${tr.x}px,${tr.y}px) scale(${tr.k})`,pointerEvents:"none"}}>
          {Object.values(persons).map(person=>{
            const pos=positions[person.id];if(!pos)return null;
            const isSel=selectedId===person.id;
            const isMatch=searchMatches?.has(person.id);
            const isDim=searchMatches&&!isMatch;
            const isRel=selectedId&&!isSel&&(selPerson?.parents?.includes(person.id)||selPerson?.spouses?.some(s=>s.id===person.id)||person.parents?.includes(selectedId));
            const isHov=hoveredCard===person.id;
            const age=calcAge(person.birthDate,person.death);
            return(
              <div key={person.id} onMouseEnter={()=>setHoveredCard(person.id)} onMouseLeave={()=>setHoveredCard(null)}
                style={{position:"absolute",left:pos.x,top:pos.y,width:CW,height:CH,background:isSel?C.cardSel:C.card,border:`1px solid ${isSel?C.borderSel:isMatch?C.borderMatch:isRel?"rgba(99,102,241,0.35)":C.border}`,borderRadius:10,backdropFilter:"blur(12px)",padding:"9px 10px",pointerEvents:"auto",boxSizing:"border-box",userSelect:"none",boxShadow:isSel?"0 0 0 2px rgba(99,102,241,0.45),0 8px 32px rgba(0,0,0,0.28)":isRel?"0 0 0 1px rgba(99,102,241,0.2)":"0 2px 10px rgba(0,0,0,0.14)",opacity:isDim?0.2:1,transition:"opacity 0.2s,box-shadow 0.2s"}}>
                <div onMouseDown={e=>onCardDragStart(e,person.id)} title="Переместить" style={{position:"absolute",top:0,left:0,width:22,height:CH,display:"flex",alignItems:"center",justifyContent:"center",cursor:"grab",borderRadius:"10px 0 0 10px",background:isHov?"rgba(99,102,241,0.1)":"transparent",zIndex:2}}><GripVertical size={12} color={isHov?C.gripHover:C.grip} style={{pointerEvents:"none"}}/></div>
                <div style={{paddingLeft:14,cursor:"pointer"}} onClick={()=>setSelectedId(id=>id===person.id?null:person.id)} onMouseDown={e=>e.stopPropagation()}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:7}}>
                    <Avatar person={person} size={31}/>
                    <div style={{flex:1,overflow:"hidden"}}>
                      <div style={{fontSize:10.5,fontWeight:700,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.3}}>{person.name||"—"}</div>
                      <div style={{fontSize:9.5,color:C.sub,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.35}}>{person.surname||""}</div>
                    </div>
                  </div>
                  {(person.birthDate||person.death)&&<div style={{marginTop:5,fontSize:8.5,color:C.muted,lineHeight:1.4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{[person.birthDate?`р. ${person.birthDate}`:"",person.death?`† ${person.death}`:""].filter(Boolean).join(" · ")}{age!==null&&<span> · {age} л.</span>}</div>}
                  {(person.city||person.country)&&<div style={{fontSize:8.5,color:C.muted,opacity:0.7,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{[person.city,person.country].filter(Boolean).join(", ")}</div>}
                </div>
                {person.death&&<div style={{position:"absolute",top:7,right:7,width:6,height:6,borderRadius:"50%",background:"#64748b"}}/>}
                {isSel&&<div style={{position:"absolute",bottom:-1,left:CW/2-4,width:8,height:3,borderRadius:"2px 2px 0 0",background:"#6366f1"}}/>}
              </div>
            );
          })}
        </div>
      </div>

      <div style={{position:"absolute",bottom:16,left:16,zIndex:100,fontSize:11,color:C.muted,background:C.hdr,backdropFilter:"blur(10px)",border:`1px solid ${C.border}`,borderRadius:8,padding:"4px 10px"}}>{Math.round(tr.k*100)}%</div>

      {selPerson&&(
        <div style={{position:"absolute",bottom:16,right:16,width:272,maxHeight:"calc(100vh - 80px)",overflowY:"auto",background:C.panel,backdropFilter:"blur(24px)",borderRadius:14,border:`1px solid ${C.border}`,padding:16,zIndex:300,boxShadow:"0 24px 80px rgba(0,0,0,0.3)",animation:"slideUp 0.2s ease"}}>
          <button onClick={()=>setSelectedId(null)} style={{position:"absolute",top:11,right:11,background:"none",border:"none",cursor:"pointer",color:C.muted,padding:3,display:"flex"}}><X size={14}/></button>
          <button onClick={()=>openEdit(selPerson)} style={{position:"absolute",top:11,right:34,background:"none",border:"none",cursor:"pointer",color:"#6366f1",padding:3,display:"flex"}}><Edit2 size={14}/></button>
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:13}}>
            <Avatar person={selPerson} size={46}/>
            <div><div style={{fontSize:14,fontWeight:800,color:C.text,lineHeight:1.25}}>{selPerson.name}</div><div style={{fontSize:12,color:C.sub}}>{selPerson.surname}</div></div>
          </div>
          {[{icon:<Calendar size={11}/>,val:[selPerson.birthDate?`р. ${selPerson.birthDate}`:"",selPerson.death?`† ${selPerson.death}`:"",selAge!==null?(selPerson.death?`возраст ${ageLabel(selAge)}`:ageLabel(selAge)):""].filter(Boolean).join("  ·  ")},{icon:<MapPin size={11}/>,val:[selPerson.city,selPerson.country].filter(Boolean).join(", ")}].filter(d=>d.val).map((d,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5,color:C.sub,fontSize:11}}><span style={{color:C.muted,flexShrink:0}}>{d.icon}</span>{d.val}</div>))}
          {selPerson.bio&&<div style={{fontSize:11,color:C.sub,marginTop:6,lineHeight:1.5,padding:"6px 8px",background:C.inp,borderRadius:6}}>{selPerson.bio}</div>}
          {detailSections.filter(s=>s.items.length>0).map(section=>(
            <div key={section.label} style={{marginTop:10}}>
              <div style={{fontSize:9.5,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:section.breakdown?2:5,fontWeight:600}}>{section.label} ({section.items.length})</div>
              {section.breakdown&&<div style={{fontSize:10,color:C.sub,marginBottom:5}}>{section.breakdown}</div>}
              {section.items.map(relRow)}
            </div>
          ))}
        </div>
      )}

      {editModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",backdropFilter:"blur(6px)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.target===e.currentTarget&&setEditModal(null)}>
          <div style={{width:"100%",maxWidth:440,maxHeight:"90vh",overflowY:"auto",background:C.modal,borderRadius:16,padding:22,border:`1px solid ${C.border}`,boxShadow:"0 30px 100px rgba(0,0,0,0.5)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <h2 style={{color:C.text,fontSize:15,margin:0,fontWeight:800}}>{editModal==="new"?"Добавить человека":"Редактировать"}</h2>
              <button onClick={()=>setEditModal(null)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,display:"flex"}}><X size={16}/></button>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,color:C.sub,display:"block",marginBottom:5,fontWeight:600}}>Пол</label>
              <div style={{display:"flex",gap:6}}>{[["male","Мужской","#6366f1"],["female","Женский","#ec4899"],["unknown","Неизвестно","#0ea5e9"]].map(([v,l,col])=>(<button key={v} onClick={()=>setEditForm(f=>({...f,gender:v}))} style={{flex:1,padding:"6px 4px",borderRadius:8,fontSize:10.5,cursor:"pointer",fontFamily:"inherit",fontWeight:600,border:`1px solid ${editForm.gender===v?col:C.border}`,background:editForm.gender===v?`${col}22`:"transparent",color:editForm.gender===v?col:C.sub}}>{l}</button>))}</div>
            </div>
            {[["name","Имя"],["surname","Фамилия"],["birthDate","Дата рождения (ДД.ММ.ГГГГ)"],["death","Год смерти"],["city","Город"],["country","Страна"]].map(([key,label])=>(<div key={key} style={{marginBottom:10}}><label style={{fontSize:11,color:C.sub,display:"block",marginBottom:3,fontWeight:600}}>{label}</label><input value={editForm[key]||""} onChange={e=>setEditForm(f=>({...f,[key]:e.target.value}))} style={iStyle}/></div>))}
            <div style={{marginBottom:14}}><label style={{fontSize:11,color:C.sub,display:"block",marginBottom:3,fontWeight:600}}>Биография</label><textarea value={editForm.bio||""} onChange={e=>setEditForm(f=>({...f,bio:e.target.value}))} rows={2} style={{...iStyle,resize:"vertical"}}/></div>
            <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:2}}><RelSection C={C} label="Родители (макс. 2)" color="#6366f1" selectedIds={editParentIds} persons={persons} excludeIds={[editForm.id,...editChildrenIds]} maxItems={2} onToggle={toggleParent}/></div>
            <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:2}}><RelSection C={C} label="Супруги" color="#f43f5e" selectedIds={editSpouseIds} persons={persons} excludeIds={[editForm.id]} maxItems={null} onToggle={toggleSpouse}/></div>
            <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:14}}><RelSection C={C} label="Дети" color="#10b981" selectedIds={editChildrenIds} persons={persons} excludeIds={[editForm.id,...editParentIds]} maxItems={null} onToggle={toggleChild}/></div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={saveEdit} style={{flex:1,padding:9,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit"}}>Сохранить</button>
              {editModal!=="new"&&<button onClick={()=>delPerson(editModal)} style={{padding:"9px 14px",borderRadius:10,background:"transparent",border:"1px solid #ef4444",color:"#ef4444",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Удалить</button>}
            </div>
          </div>
        </div>
      )}

      {importModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",backdropFilter:"blur(6px)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.target===e.currentTarget&&setImportModal(false)}>
          <div style={{width:"100%",maxWidth:420,maxHeight:"80vh",overflowY:"auto",background:C.modal,borderRadius:16,padding:20,border:`1px solid ${C.border}`,boxShadow:"0 30px 100px rgba(0,0,0,0.5)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <h2 style={{color:C.text,fontSize:15,margin:0,fontWeight:800}}>Найти общего родственника</h2>
              <button onClick={()=>setImportModal(false)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,display:"flex"}}><X size={16}/></button>
            </div>
            <p style={{fontSize:11.5,color:C.sub,margin:"0 0 14px",lineHeight:1.5}}>Поиск по всем деревьям. Импортируйте ветку и свяжите через редактирование.</p>
            {importSelected?(
              <div>
                <div style={{display:"flex",alignItems:"center",gap:10,padding:12,background:C.inp,borderRadius:10,marginBottom:14}}><Avatar person={importSelected.person} size={36}/><div><div style={{fontSize:13,fontWeight:700,color:C.text}}>{importSelected.person.name} {importSelected.person.surname}</div><div style={{fontSize:11,color:C.sub}}>Дерево «{importSelected.treeTitle}»</div></div></div>
                <p style={{fontSize:12,color:C.sub,marginBottom:14,lineHeight:1.5}}>Будет импортировано {Object.keys(allTreesCache[importSelected.treeId]?.persons||{}).length} человек из этого дерева.</p>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>importTree(importSelected.treeId,importSelected.person.id,importSelected.treeTitle)} style={{flex:1,padding:9,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit"}}>Импортировать ветку</button>
                  <button onClick={()=>setImportSelected(null)} style={{padding:"9px 16px",borderRadius:10,background:"transparent",border:`1px solid ${C.border}`,color:C.sub,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Назад</button>
                </div>
              </div>
            ):(
              <>
                <div style={{position:"relative",marginBottom:10}}><Search size={13} style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:C.muted}}/><input value={importQuery} onChange={e=>setImportQuery(e.target.value)} placeholder="Имя или фамилия…" autoFocus style={{...iStyle,paddingLeft:30}}/></div>
                {importBusy&&<div style={{fontSize:12,color:C.muted,textAlign:"center",padding:14}}>Загрузка деревьев…</div>}
                {!importBusy&&treesIndex.length<=1&&<div style={{fontSize:12,color:C.muted,textAlign:"center",padding:14}}>Других деревьев пока нет</div>}
                {!importBusy&&treesIndex.length>1&&importQuery.trim()&&importResults.length===0&&<div style={{fontSize:12,color:C.muted,textAlign:"center",padding:14}}>Никого не найдено в других деревьях</div>}
                {!importBusy&&importResults.map((r,i)=>(<div key={r.treeId+r.person.id+i} onClick={()=>setImportSelected(r)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 6px",borderRadius:8,cursor:"pointer"}}><Avatar person={r.person} size={28}/><div style={{flex:1,minWidth:0}}><div style={{fontSize:12.5,fontWeight:600,color:C.text}}>{r.person.name} {r.person.surname}</div><div style={{fontSize:10.5,color:C.muted}}>Дерево «{r.treeTitle}»</div></div><ChevronRight size={14} color={C.muted}/></div>))}
              </>
            )}
          </div>
        </div>
      )}
      <style>{spinStyle+`input::placeholder,textarea::placeholder{color:${C.muted}}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
