function calcAge(b,d){
  if(!b)return null;
  const p=b.split('.');if(p.length<3)return null;
  const dd=+p[0],mm=+p[1],yy=+p[2];if(!yy||isNaN(yy))return null;
  if(d){const dy=+d;if(!isNaN(dy))return dy-yy>=0?dy-yy:null;}
  const now=new Date();let a=now.getFullYear()-yy;
  if(now.getMonth()<mm-1||(now.getMonth()===mm-1&&now.getDate()<dd))a--;
  return a>=0?a:null;
}
function ageLabel(a){
  if(a==null)return'';
  const m10=a%10,m100=a%100;
  if(m100>=11&&m100<=14)return a+' лет';
  if(m10===1)return a+' год';
  if(m10>=2&&m10<=4)return a+' года';
  return a+' лет';
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

}
function gbd(items,mw,fw){

  return[m?m+' '+mw:'',f?f+' '+fw:'',o?o+' др.':''].filter(Boolean).join(' · ');
}

// ─────────────────────────────────────────
//  GENERATION CALCULATOR (up to 7 gens)
// ─────────────────────────────────────────
function computeGenerations(persons){
  // BFS from roots (no parents). Gen 1 = oldest.
  const gen={};
  const allIds=Object.keys(persons);
  // Find people with no parents in the set
  const roots=allIds.filter(id=>!(persons[id].parents||[]).some(pid=>persons[pid]));
  const queue=[...roots];
  roots.forEach(id=>{gen[id]=1;});
  // BFS downward
  const visited=new Set(roots);
  while(queue.length){
    const id=queue.shift();
    const g=gen[id]||1;
    // children
    allIds.forEach(cid=>{
      if((persons[cid].parents||[]).includes(id)){
        const ng=g+1;
        if(!gen[cid]||gen[cid]<ng)gen[cid]=ng;
        if(!visited.has(cid)){visited.add(cid);queue.push(cid);}
      }
    });
    // spouses inherit same gen
    (persons[id].spouses||[]).forEach(s=>{
      if(!gen[s.id]&&persons[s.id]){gen[s.id]=g;if(!visited.has(s.id)){visited.add(s.id);queue.push(s.id);}}
    });
  }
  // assign remaining (orphans or disconnected)
  allIds.forEach(id=>{if(!gen[id])gen[id]=1;});
  return gen;
}

function getGenLabel(n){
  const labels=['','I поколение','II поколение','III поколение','IV поколение','V поколение','VI поколение','VII поколение'];
  return labels[n]||('Поколение '+n);
}

function schedSave(){
  if(!S.loaded||!S.treeId||S.stage!=='tree')return;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    db.set('td:'+S.treeId,JSON.stringify({persons:S.persons,positions:S.pos}));
    S.treesIndex=S.treesIndex.map(t=>t.id===S.treeId?{...t,n:Object.keys(S.persons).length}:t);
    db.set('tidx',JSON.stringify(S.treesIndex));
  },600);
}

async function boot(){
  render();
  const name=db.get('iname');
  let idx=null;try{const r=db.get('tidx');if(r)idx=JSON.parse(r);}catch(e){}
  if(!idx){
    idx=[{id:'default',title:'Наша семья',owner:'Семья',ts:Date.now(),n:Object.keys(INIT_P).length}];
    db.set('tidx',JSON.stringify(idx));
    db.set('td:default',JSON.stringify({persons:INIT_P,positions:INIT_POS}));
  }
  S.treesIndex=idx;
  if(!name){S.stage='identity';render();return;}
  S.ident=name;
  let lastId=db.get('last-tid');
  if(lastId&&idx.some(t=>t.id===lastId))await loadTree(lastId);
  else{S.stage='hub';render();}
}

async function loadTree(id){
  S.loaded=false;S.stage='tree';render();
  let data=null;try{const r=db.get('td:'+id);if(r)data=JSON.parse(r);}catch(e){}
  S.persons=data?.persons||{};S.pos=data?.positions||{};
  S.treeId=id;S.selId=null;S.editModal=null;S.search='';S.tr={x:390,y:90,k:0.68};
  S.loaded=true;db.set('last-tid',id);render();
}

function render(){
  const c=C();
  document.documentElement.style.setProperty('--bg',c.bg);
  document.documentElement.style.setProperty('--hdr',c.hdr);
  document.documentElement.style.setProperty('--card',c.card);
  document.documentElement.style.setProperty('--border',c.border);
  document.documentElement.style.setProperty('--text',c.text);
  document.documentElement.style.setProperty('--sub',c.sub);
  document.documentElement.style.setProperty('--muted',c.muted);
  document.documentElement.style.setProperty('--inp',c.inp);
  document.documentElement.style.setProperty('--panel',c.panel);
  document.documentElement.style.setProperty('--modal',c.modal);
  document.body.style.background=c.bg;
  const app=document.getElementById('app');
  if(S.stage==='loading')app.innerHTML=loadingHTML();
  else if(S.stage==='identity')app.innerHTML=identityHTML();
  else if(S.stage==='hub'){app.innerHTML=hubHTML();bindHub();}
  else if(S.stage==='tree'){
    if(!S.loaded)app.innerHTML=loadingHTML();
    else{app.innerHTML=treeHTML();bindTree();}
  }
}

function bindHub(){
  document.getElementById('darkBtn')?.addEventListener('click',()=>{S.dark=!S.dark;render();});
  document.getElementById('meBtn')?.addEventListener('click',()=>{S.nameIn=S.ident;S.stage='identity';render();});
  document.getElementById('newTreeBtn')?.addEventListener('click',()=>{S.newTreeModal=true;render();});
  document.getElementById('createTreeBtn')?.addEventListener('click',doCreateTree);
  document.getElementById('cancelTreeBtn')?.addEventListener('click',()=>{S.newTreeModal=false;S.newTreeTitle='';render();});
  document.getElementById('newTreeBg')?.addEventListener('click',e=>{if(e.target.id==='newTreeBg'){S.newTreeModal=false;S.newTreeTitle='';render();}});
  document.querySelectorAll('.tree-card').forEach(el=>{
    el.addEventListener('click',e=>{if(!e.target.closest('.del-tree'))loadTree(el.dataset.id);});
  });
  document.querySelectorAll('.del-tree').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();if(!confirm('Удалить дерево?'))return;
      db.del('td:'+el.dataset.id);S.treesIndex=S.treesIndex.filter(t=>t.id!==el.dataset.id);
      db.set('tidx',JSON.stringify(S.treesIndex));render();});
  });
  if(S.newTreeModal)setTimeout(()=>document.getElementById('newTreeInp')?.focus(),50);
}
function doCreateTree(){
  const title=(S.newTreeTitle||'').trim()||'Новое дерево';
  const id='t'+Date.now(),sid='p'+Date.now();
  const ip={[sid]:{id:sid,name:S.ident||'',surname:'',birthDate:'',death:'',city:'',country:'',bio:'',gender:'unknown',parents:[],spouses:[]}};
  const ipp={[sid]:{x:300,y:200}};
  db.set('td:'+id,JSON.stringify({persons:ip,positions:ipp}));
  const meta={id,title,owner:S.ident||'',ts:Date.now(),n:1};
  S.treesIndex=[...S.treesIndex,meta];
  db.set('tidx',JSON.stringify(S.treesIndex));
  S.newTreeModal=false;S.newTreeTitle='';loadTree(id);
}

// ─────────────────────────────────────────
//  BIND TREE EVENTS
// ─────────────────────────────────────────
function bindTree(){
  document.getElementById('backBtn')?.addEventListener('click',()=>{S.stage='hub';_pan=_drag=null;render();});
  document.getElementById('zInBtn')?.addEventListener('click',()=>{S.tr={...S.tr,k:Math.min(3,S.tr.k*1.2)};applyTransform();});
  document.getElementById('zOutBtn')?.addEventListener('click',()=>{S.tr={...S.tr,k:Math.max(0.1,S.tr.k*0.82)};applyTransform();});
  document.getElementById('homeBtn')?.addEventListener('click',()=>{S.tr={x:390,y:90,k:0.68};applyTransform();});
  document.getElementById('viewToggleBtn')?.addEventListener('click',()=>{S.viewMode=S.viewMode==='canvas'?'gen':'canvas';render();});
  document.getElementById('darkBtn2')?.addEventListener('click',()=>{S.dark=!S.dark;render();});
  document.getElementById('importBtn')?.addEventListener('click',openImport);
  document.getElementById('addBtn')?.addEventListener('click',()=>openEdit(null));
  document.getElementById('pngBtn')?.addEventListener('click',exportPNG);
  document.getElementById('pdfTreeBtn')?.addEventListener('click',printTreePDF);
  const canvas=document.getElementById('canvas');
  if(canvas){
    canvas.addEventListener('mousedown',e=>{if(e.button!==0||e.target.closest('.grip')||e.target.closest('.card-el'))return;_pan={ox:e.clientX-S.tr.x,oy:e.clientY-S.tr.y};canvas.style.cursor='grabbing';});
    canvas.addEventListener('wheel',e=>{e.preventDefault();const rect=canvas.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;const f=e.deltaY<0?1.1:0.9;const k=Math.max(0.1,Math.min(3,S.tr.k*f));S.tr={x:mx-(mx-S.tr.x)*(k/S.tr.k),y:my-(my-S.tr.y)*(k/S.tr.k),k};applyTransform();},{passive:false});
    canvas.addEventListener('touchstart',onTS,{passive:false});
    canvas.addEventListener('touchmove',onTM,{passive:false});
    canvas.addEventListener('touchend',()=>{_touch=null;});
  }
  window.addEventListener('mousemove',onMM);
  window.addEventListener('mouseup',onMU);
  renderCanvasContent();
  if(S.viewMode==='gen')renderGenView();
  renderDetailPanel();
}

function onTS(e){
  if(e.touches.length===1){_touch={mode:'pan',ox:e.touches[0].clientX-S.tr.x,oy:e.touches[0].clientY-S.tr.y};}
  else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;_touch={mode:'pinch',d:Math.hypot(dx,dy),k:S.tr.k,x:S.tr.x,y:S.tr.y};}
}
function onTM(e){
  e.preventDefault();if(!_touch)return;
  if(_touch.mode==='pan'&&e.touches.length===1){S.tr={...S.tr,x:e.touches[0].clientX-_touch.ox,y:e.touches[0].clientY-_touch.oy};applyTransform();}
  else if(_touch.mode==='pinch'&&e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;S.tr={x:_touch.x,y:_touch.y,k:Math.max(0.1,Math.min(3,_touch.k*Math.hypot(dx,dy)/_touch.d))};applyTransform();}
}
function onMM(e){
  if(_drag){const k=S.tr.k;S.pos={...S.pos,[_drag.id]:{x:_drag.px+(e.clientX-_drag.sx)/k,y:_drag.py+(e.clientY-_drag.sy)/k}};updateCardPos(_drag.id);updateLines();schedSave();}
  else if(_pan){S.tr={...S.tr,x:e.clientX-_pan.ox,y:e.clientY-_pan.oy};applyTransform();}
}
function onMU(){_pan=null;_drag=null;document.getElementById('canvas')?.style&&(document.getElementById('canvas').style.cursor='grab');}

function applyTransform(){
  const cl=document.getElementById('cards-layer');if(cl)cl.style.transform=`translate(${S.tr.x}px,${S.tr.y}px) scale(${S.tr.k})`;
  const svg=document.getElementById('lines-svg');if(svg){const g=svg.querySelector('g');if(g)g.setAttribute('transform',`translate(${S.tr.x},${S.tr.y}) scale(${S.tr.k})`);}

}
function updateCardPos(id){const el=document.getElementById('card-'+id);if(el&&S.pos[id]){el.style.left=S.pos[id].x+'px';el.style.top=S.pos[id].y+'px';}}

function getLines(){
  const spL=[],chL=[],seen=new Set();
  Object.values(S.persons).forEach(p=>{
    (p.spouses||[]).forEach(s=>{const k=[p.id,s.id].sort().join('|');if(!seen.has(k)&&S.pos[p.id]&&S.pos[s.id]){seen.add(k);spL.push({a:p.id,b:s.id});}});
    const vp=(p.parents||[]).filter(pid=>S.pos[pid]);
    if(vp.length&&S.pos[p.id])chL.push({child:p.id,parents:vp});
  });
  return{spL,chL};
}
function renderLines(){
  const svg=document.getElementById('lines-svg');if(!svg)return;
  const{spL,chL}=getLines();const c=C();
  let h='';
  spL.forEach(({a,b})=>{const pa=S.pos[a],pb=S.pos[b];if(!pa||!pb)return;const hi=S.selId&&(S.selId===a||S.selId===b);h+=`<line x1="${pa.x+CW/2}" y1="${pa.y+CH/2}" x2="${pb.x+CW/2}" y2="${pb.y+CH/2}" stroke="${hi?c.hl:c.ss}" stroke-width="${hi?2:1.5}" stroke-dasharray="5,4"/>`;});
  chL.forEach(({child,parents})=>{const cp=S.pos[child];if(!cp)return;let sx,sy;if(parents.length===1){const pp=S.pos[parents[0]];if(!pp)return;sx=pp.x+CW/2;sy=pp.y+CH;}else{const p1=S.pos[parents[0]],p2=S.pos[parents[1]];if(!p1||!p2)return;sx=(p1.x+p2.x)/2+CW/2;sy=Math.max(p1.y,p2.y)+CH/2;}const ex=cp.x+CW/2,ey=cp.y,my=(sy+ey)/2;const hi=S.selId&&(parents.includes(S.selId)||child===S.selId);h+=`<path d="M${sx} ${sy} C${sx} ${my},${ex} ${my},${ex} ${ey}" fill="none" stroke="${hi?c.hl:c.cs}" stroke-width="${hi?2:1.5}"/>`;});
  svg.innerHTML=`<g transform="translate(${S.tr.x},${S.tr.y}) scale(${S.tr.k})">${h}</g>`;
}
function updateLines(){renderLines();}

// ─────────────────────────────────────────
//  RELATIVES
// ─────────────────────────────────────────
function getRelatives(){
  const p=S.persons[S.selId];if(!p)return{};
  const pars=(p.parents||[]).map(id=>S.persons[id]).filter(Boolean);
  const sps=(p.spouses||[]).map(s=>S.persons[s.id]).filter(Boolean);
  const chs=Object.values(S.persons).filter(x=>(x.parents||[]).includes(p.id));
  const sibSet=new Set(p.parents||[]);
  const sibs=Object.values(S.persons).filter(x=>x.id!==p.id&&(x.parents||[]).some(pid=>sibSet.has(pid)));
  const auMap=new Map();
  (p.parents||[]).forEach(pid=>{const par=S.persons[pid];if(!par||!par.parents?.length)return;const gp=new Set(par.parents);Object.values(S.persons).forEach(x=>{if(x.id!==par.id&&(x.parents||[]).some(g=>gp.has(g))){auMap.set(x.id,x);(x.spouses||[]).forEach(s=>{if(S.persons[s.id])auMap.set(s.id,S.persons[s.id]);});}});});
  const aus=Array.from(auMap.values());
  const auIds=new Set(aus.map(a=>a.id));
  const cous=Object.values(S.persons).filter(x=>(x.parents||[]).some(pid=>auIds.has(pid)));
  const gpMap=new Map();
  (p.parents||[]).forEach(pid=>{const par=S.persons[pid];if(par)(par.parents||[]).forEach(gpid=>{if(S.persons[gpid])gpMap.set(gpid,S.persons[gpid]);});});
  const gps=Array.from(gpMap.values());
  // great-grandparents
  const ggpMap=new Map();
  gps.forEach(gp=>{(gp.parents||[]).forEach(ggpid=>{if(S.persons[ggpid])ggpMap.set(ggpid,S.persons[ggpid]);});});
  const ggps=Array.from(ggpMap.values());
  const cIds=new Set(chs.map(c=>c.id));
  const gcs=Object.values(S.persons).filter(x=>(x.parents||[]).some(pid=>cIds.has(pid)));
  // great-grandchildren
  const gcIds=new Set(gcs.map(c=>c.id));
  const ggcs=Object.values(S.persons).filter(x=>(x.parents||[]).some(pid=>gcIds.has(pid)));
  const z=[],n=[];chs.forEach(c=>{(c.spouses||[]).forEach(s=>{const sp=S.persons[s.id];if(!sp)return;if(c.gender==='female')z.push(sp);else if(c.gender==='male')n.push(sp);});});
  const sIds=new Set(sibs.map(x=>x.id));
  const neps=Object.values(S.persons).filter(x=>(x.parents||[]).some(pid=>sIds.has(pid)));
  return{pars,sps,chs,sibs,aus,cous,gps,ggps,gcs,ggcs,inLaws:{z,n,all:[...z,...n]},neps};
}

function doSave(){
  const id=S.ef.id;
  const up={...S.ef,parents:[...S.ePar],spouses:S.eSp.map(sid=>({id:sid}))};
  const np={...S.persons,[id]:up};
  S.eCh.forEach(cid=>{if(np[cid]&&!np[cid].parents.includes(id))np[cid]={...np[cid],parents:[...np[cid].parents,id]};});
  Object.values(S.persons).filter(p=>(p.parents||[]).includes(id)&&p.id!==id).forEach(c=>{if(!S.eCh.includes(c.id)&&np[c.id])np[c.id]={...np[c.id],parents:np[c.id].parents.filter(pid=>pid!==id)};});
  S.eSp.forEach(sid=>{if(np[sid]&&!(np[sid].spouses||[]).some(s=>s.id===id))np[sid]={...np[sid],spouses:[...(np[sid].spouses||[]),{id}]};});
  (S.persons[id]?.spouses||[]).map(s=>s.id).forEach(sid=>{if(!S.eSp.includes(sid)&&np[sid])np[sid]={...np[sid],spouses:(np[sid].spouses||[]).filter(s=>s.id!==id)};});
  S.persons=np;
  if(!S.pos[id])S.pos={...S.pos,[id]:{x:300,y:300}};
  S.editModal=null;document.getElementById('modals').innerHTML='';
  renderCanvasContent();if(S.viewMode==='gen')renderGenView();renderDetailPanel();schedSave();
}
function doDelPerson(id){
  const{[id]:_,...rest}=S.persons;S.persons=rest;

}

function printTreePDF(){
  const margin=50,sc=1.6;
  const all=Object.entries(S.pos).filter(([id])=>S.persons[id]);if(!all.length)return;
  const xs=all.map(([,p])=>p.x),ys=all.map(([,p])=>p.y);
  const mnX=Math.min(...xs)-margin,mnY=Math.min(...ys)-margin;
  const W=Math.max(...xs)+CW+margin-mnX,H=Math.max(...ys)+CH+margin-mnY;
  const cv=document.createElement('canvas');cv.width=W*sc;cv.height=H*sc;
  const ctx=cv.getContext('2d');ctx.scale(sc,sc);ctx.translate(-mnX,-mnY);
  ctx.fillStyle='#ffffff';ctx.fillRect(mnX,mnY,W,H);
  const{spL,chL}=getLines();
  spL.forEach(({a,b})=>{const pa=S.pos[a],pb=S.pos[b];if(!pa||!pb)return;ctx.save();ctx.setLineDash([5,4]);ctx.strokeStyle='rgba(0,0,0,0.13)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pa.x+CW/2,pa.y+CH/2);ctx.lineTo(pb.x+CW/2,pb.y+CH/2);ctx.stroke();ctx.restore();});
  chL.forEach(({child,parents})=>{const cp=S.pos[child];if(!cp)return;let sx,sy;if(parents.length===1){const pp=S.pos[parents[0]];if(!pp)return;sx=pp.x+CW/2;sy=pp.y+CH;}else{const p1=S.pos[parents[0]],p2=S.pos[parents[1]];if(!p1||!p2)return;sx=(p1.x+p2.x)/2+CW/2;sy=Math.max(p1.y,p2.y)+CH/2;}const ex=cp.x+CW/2,ey=cp.y,my=(sy+ey)/2;ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1.5;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(sx,sy);ctx.bezierCurveTo(sx,my,ex,my,ex,ey);ctx.stroke();});

    ctx.fillStyle='#5a6380';ctx.font='9px system-ui,sans-serif';ctx.fillText((p.surname||'').slice(0,17),pp.x+42,pp.y+34);

    const d=[p.birthDate?'р.'+p.birthDate:'',age!=null?ageLabel(age):''].filter(Boolean).join(' · ');
    ctx.fillStyle='#9aa0b8';ctx.font='8.5px system-ui,sans-serif';if(d)ctx.fillText(d.slice(0,26),pp.x+10,pp.y+58);
    const loc=[p.city,p.country].filter(Boolean).join(', ');if(loc)ctx.fillText(loc.slice(0,24),pp.x+10,pp.y+70);
  });
  const imgData=cv.toDataURL('image/png');
  const ctree=S.treesIndex.find(t=>t.id===S.treeId)||{};
  const win=window.open('','_blank');if(!win)return;
  win.document.write(`<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"/>
  <title>${esc(ctree.title||'Семейное Древо')}</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}

    @media print{body{background:#fff;padding:0}@page{margin:5mm;size:landscape A3}}
    .info{background:#fff;border-radius:12px;padding:14px 22px;width:100%;max-width:1100px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
    .title{font-size:18px;font-weight:800;color:#18202e}

    .tree-img{background:#fff;border-radius:12px;overflow:auto;box-shadow:0 2px 20px rgba(0,0,0,0.08);max-width:100%}
    img{display:block;max-width:100%;height:auto}
    .print-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:14px;padding:13px 28px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 6px 22px rgba(99,102,241,0.35)}
    @media print{.print-btn,.info{display:none}}
  </style></head><body>
  <div class="info">
    <div><div class="title">${esc(ctree.title||'Семейное Древо')}</div><div class="sub">${Object.keys(S.persons).length} чел. · до ${Math.min(7,Math.max(...Object.values(computeGenerations(S.persons))))} поколений · ${new Date().toLocaleDateString('ru-RU')}</div></div>
    <button class="print-btn" onclick="window.print()">🖨 Распечатать / PDF</button>
  </div>

  </body></html>`);
  win.document.close();
}

  const mnX=Math.min(...xs)-margin,mnY=Math.min(...ys)-margin;
  const W=Math.max(...xs)+CW+margin-mnX,H=Math.max(...ys)+CH+margin-mnY;
  const cv=document.createElement('canvas');cv.width=W*sc;cv.height=H*sc;
  const ctx=cv.getContext('2d');ctx.scale(sc,sc);ctx.translate(-mnX,-mnY);
  ctx.fillStyle='#06091a';ctx.fillRect(mnX,mnY,W,H);
  const{spL,chL}=getLines();
  spL.forEach(({a,b})=>{const pa=S.pos[a],pb=S.pos[b];if(!pa||!pb)return;ctx.save();ctx.setLineDash([5,4]);ctx.strokeStyle='rgba(255,255,255,0.16)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pa.x+CW/2,pa.y+CH/2);ctx.lineTo(pb.x+CW/2,pb.y+CH/2);ctx.stroke();ctx.restore();});
  chL.forEach(({child,parents})=>{const cp=S.pos[child];if(!cp)return;let sx,sy;if(parents.length===1){const pp=S.pos[parents[0]];if(!pp)return;sx=pp.x+CW/2;sy=pp.y+CH;}else{const p1=S.pos[parents[0]],p2=S.pos[parents[1]];if(!p1||!p2)return;sx=(p1.x+p2.x)/2+CW/2;sy=Math.max(p1.y,p2.y)+CH/2;}const ex=cp.x+CW/2,ey=cp.y,my=(sy+ey)/2;ctx.strokeStyle='rgba(255,255,255,0.22)';ctx.lineWidth=1.5;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(sx,sy);ctx.bezierCurveTo(sx,my,ex,my,ex,ey);ctx.stroke();});
  Object.values(S.persons).forEach(p=>{const pp=S.pos[p.id];if(!pp)return;
    ctx.fillStyle='rgba(15,21,52,0.9)';ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.setLineDash([]);
    const r=10,x=pp.x,y=pp.y,w=CW,h=CH;
    ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fill();ctx.stroke();
    const[c1,c2]=gc(p.gender);const g=ctx.createLinearGradient(pp.x+10,pp.y+10,pp.x+38,pp.y+38);g.addColorStop(0,c1);g.addColorStop(1,c2);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(pp.x+23,pp.y+30,14,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText((p.name||'?')[0],pp.x+23,pp.y+34);ctx.textAlign='left';
    ctx.fillStyle='#dde2f0';ctx.font='bold 10px sans-serif';ctx.fillText((p.name||'').slice(0,17),pp.x+42,pp.y+23);
    ctx.fillStyle='#8892b0';ctx.font='9px sans-serif';ctx.fillText((p.surname||'').slice(0,17),pp.x+42,pp.y+34);
    const age=calcAge(p.birthDate,p.death);
    const d=[p.birthDate?'р.'+p.birthDate:'',age!=null?ageLabel(age):''].filter(Boolean).join(' · ');
    ctx.fillStyle='#3d4a70';ctx.font='8.5px sans-serif';if(d)ctx.fillText(d.slice(0,26),pp.x+10,pp.y+58);
    const loc=[p.city,p.country].filter(Boolean).join(', ');if(loc)ctx.fillText(loc.slice(0,24),pp.x+10,pp.y+70);
